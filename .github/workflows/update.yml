name: Auto Update Japan Trends
on:
  schedule:
    - cron: '0 16 * * *' # 國際時間 16:00 即台灣凌晨 0:00
  workflow_dispatch: # 允許手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Scraper
        run: python scraper.py
      - name: Commit and Push
        run: |
          git config --global user.name "TrendBot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Auto-update trends and rates" || exit 0
          git push
