<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPAN PRO | 日本代購數據決策終端 v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; background: #f1f5f9; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.3s; }
        .glass-card:hover { border-color: #4f46e5; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1); }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #a855f7 100%); }
        .rank-badge { background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); color: white; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; font-size: 14px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [data, setData] = useState(null);
            const [calc, setCalc] = useState({ jpy: '', weight: 0.5, fee: 230 });
            const chartRef = useRef(null); // 用於引用 Chart 實例

            useEffect(() => {
                fetch('./data.json')
                    .then(res => res.json())
                    .then(d => {
                        setData(d);
                        renderChart(d.ratio); // 數據載入後繪製圖表
                    })
                    .catch(() => console.error("數據載入失敗"));
            }, []);

            // 繪製分類占比圖 (Chart.js)
            const renderChart = (ratioData) => {
                const ctx = document.getElementById('ratioChart').getContext('2d');
                
                // 如果已有圖表實例，先銷毀以防重疊
                if (chartRef.current) chartRef.current.destroy();

                chartRef.current = new Chart(ctx, {
                    type: 'doughnut', // 甜甜圈圖
                    data: {
                        labels: Object.keys(ratioData),
                        datasets: [{
                            data: Object.values(ratioData),
                            backgroundColor: ['#4f46e5', '#a855f7', '#ec4899', '#f97316'],
                            borderWidth: 0,
                            hoverOffset: 10
                        }]
                    },
                    options: {
                        cutout: '70%', // 設置空心比例
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 12, padding: 15, font: { size: 11 } } },
                            tooltip: { callbacks: { label: (ctx) => ` ${ctx.label}: ${ctx.raw}%` } }
                        }
                    }
                });
            };

            const calculateCost = () => {
                if (!calc.jpy || !data) return 0;
                const cost = (calc.jpy * data.rate) + (calc.weight * calc.fee);
                return Math.round(cost);
            };

            const totalCost = calculateCost();

            if (!data) return <div className="p-20 text-center text-indigo-600 font-bold">載入終端數據中...</div>;

            return (
                <div className="min-h-screen pb-12">
                    {/* 頂部標題區 */}
                    <div className="gradient-bg text-white pt-10 pb-20 px-6 mb-[-60px]">
                        <div className="max-w-[1500px] mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-extrabold tracking-tighter flex items-center gap-3">
                                    <i data-lucide="bar-chart-3"></i> JAPAN HUB. PRO
                                </h1>
                                <p className="opacity-70 text-xs mt-1">最後更新：{data.update_time}</p>
                            </div>
                            <div className="bg-white/10 p-3 rounded-xl border border-white/10 text-right">
                                <p className="text-[10px] opacity-70 uppercase tracking-widest font-bold">Live JPY/TWD</p>
                                <p className="text-4xl font-black">{data.rate.toFixed(4)}</p>
                            </div>
                        </div>
                    </div>

                    {/* 主版面 - 三欄佈局 */}
                    <main className="max-w-[1500px] mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* 左側：分類占比圖 */}
                        <div className="lg:col-span-3 space-y-5">
                            <h2 className="text-lg font-bold flex items-center gap-2 px-1 text-slate-700">
                                <i data-lucide="pie-chart" className="text-indigo-600 w-5 h-5"></i> 熱門分類佔比 (%)
                            </h2>
                            <div className="glass-card p-8 rounded-3xl relative h-[380px] flex flex-col justify-center items-center">
                                <canvas id="ratioChart"></canvas>
                                <div className="absolute text-center mt-[-30px]">
                                    <p className="text-[10px] text-slate-400 font-bold uppercase">總品項數</p>
                                    <p className="text-3xl font-extrabold text-indigo-600">8</p>
                                </div>
                            </div>
                        </div>

                        {/* 中間：台灣代購熱門排行 */}
                        <div className="lg:col-span-5 space-y-5">
                            <h2 className="text-lg font-bold flex items-center gap-2 px-1 text-slate-700">
                                <i data-lucide="award" className="text-orange-500 w-5 h-5"></i> 台灣市場代購排行榜 (TW Hot)
                            </h2>
                            <div className="space-y-3">
                                {data.ranking.map((item, i) => (
                                    <div key={i} className="glass-card p-5 rounded-2xl flex justify-between items-center group relative overflow-hidden">
                                        <div className="flex items-center gap-4">
                                            <div className="rank-badge">{i + 1}</div>
                                            <div>
                                                <h3 className="font-bold text-slate-800 group-hover:text-indigo-600 transition">{item.name}</h3>
                                                <p className="text-xs text-slate-500 mt-1 flex items-center gap-2">
                                                    <span className="text-indigo-500 font-medium">{item.cat}</span> • 
                                                    日本售價: ¥{item.jpy.toLocaleString()}
                                                </p>
                                            </div>
                                        </div>
                                        <div className="text-right z-10">
                                            <p className="text-sm font-bold text-slate-900">NT$ {Math.round(item.jpy * data.rate)}</p>
                                            <p className="text-[10px] text-slate-400 mt-1">成本預估 (不含運)</p>
                                        </div>
                                        <div className="absolute right-0 bottom-0 text-7xl font-black text-slate-100/70 group-hover:text-indigo-100/70 transition mt-[-20px] mr-[-10px] z-0">
                                            {item.tw_hot}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 右側：利潤計算機 */}
                        <div className="lg:col-span-4 space-y-5">
                            <h2 className="text-lg font-bold flex items-center gap-2 px-1 text-slate-700">
                                <i data-lucide="calculator" className="text-indigo-600 w-5 h-5"></i> 快速利潤精算
                            </h2>
                            <div className="glass-card p-8 rounded-3xl border-t-4 border-indigo-600 self-start sticky top-10">
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[11px] font-bold text-slate-500 block mb-1.5 uppercase tracking-wider">商品原價 (¥ JPY)</label>
                                        <input type="number" className="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-indigo-300 font-bold text-lg" placeholder="1000" value={calc.jpy} onChange={(e) => setCalc({...calc, jpy: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[11px] font-bold text-slate-500 block mb-1.5 uppercase">重量 (kg)</label>
                                            <input type="number" step="0.1" className="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl outline-none" value={calc.weight} onChange={(e) => setCalc({...calc, weight: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[11px] font-bold text-slate-500 block mb-1.5 uppercase">空運 NT$/kg</label>
                                            <input type="number" className="w-full bg-slate-50 border border-slate-100 p-3 rounded-xl outline-none" value={calc.fee} onChange={(e) => setCalc({...calc, fee: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="pt-6 border-t border-slate-100 mt-5 space-y-3">
                                        <div className="flex justify-between text-slate-600">
                                            <span>總台幣成本</span>
                                            <span className="font-bold text-slate-900">NT$ {totalCost}</span>
                                        </div>
                                        <div className="flex justify-between text-2xl">
                                            <span className="text-slate-900 font-extrabold">建議售價</span>
                                            <span className="font-black text-indigo-600">NT$ {Math.round(totalCost * 1.2)}</span>
                                        </div>
                                        <p className="text-[11px] text-slate-400 text-center italic mt-2">*(預設包含 20% 代購費與包材費)</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
