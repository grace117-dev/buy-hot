<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAPAN PRO | 日本代購決策終端 - 栞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #fdfcfc; --bg-card: #ffffff; --text-main: #334155; --accent: #f43f5e; --border: #e2e8f0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-base); color: var(--text-main); letter-spacing: 0.05em; }
        h1, h2, .jp-font { font-family: 'Noto Serif JP', serif; }
        .wabi-sabi-card { background: var(--bg-card); border: 1px solid var(--border); transition: all 0.4s; }
        .rank-number { font-family: 'Noto Serif JP', serif; font-weight: 900; color: var(--accent); opacity: 0.15; font-size: 3.5rem; line-height: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [data, setData] = useState(null);
            const [calc, setCalc] = useState({ jpy: '', weight: 0.5 });
            const chartsInit = useRef(false);

            useEffect(() => {
                // 強制抓取最新 JSON，避免快取
                fetch(`./data.json?t=${new Date().getTime()}`)
                    .then(res => res.json())
                    .then(d => setData(d))
                    .catch(e => console.error("Data Load Error:", e));
            }, []);

            useEffect(() => {
                // 核心修正：確保 data 存在且只初始化一次圖表
                if (data && !chartsInit.current) {
                    setTimeout(() => {
                        renderRadarChart(data.ratio_radar);
                        renderLineCharts(data.ranking, data.dates);
                        lucide.createIcons();
                        chartsInit.current = true;
                    }, 300);
                }
            }, [data]);

            const renderRadarChart = (radarData) => {
                const el = document.getElementById('radarChart');
                if (!el) return;
                new Chart(el.getContext('2d'), {
                    type: 'radar',
                    data: {
                        labels: radarData.map(d => d.category),
                        datasets: [{
                            data: radarData.map(d => d.value),
                            backgroundColor: 'rgba(244, 63, 94, 0.1)',
                            borderColor: '#f43f5e',
                            borderWidth: 1,
                            pointRadius: 2
                        }]
                    },
                    options: { 
                        scales: { r: { min: 0, max: 100, ticks: { display: false } } },
                        plugins: { legend: { display: false } }
                    }
                });
            };

            const renderLineCharts = (ranking, dates) => {
                ranking.forEach((item, i) => {
                    const el = document.getElementById(`lineChart-${i}`);
                    if (!el) return;
                    new Chart(el.getContext('2d'), {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                data: item.trend,
                                borderColor: i === 0 ? '#f43f5e' : '#94a3b8',
                                borderWidth: 1.5,
                                tension: 0.4,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } },
                            plugins: { legend: { display: false } }
                        }
                    });
                });
            };

            if (!data) return <div className="p-20 text-center jp-font text-rose-600">數據讀取中...</div>;

            const totalCost = Math.round((calc.jpy * data.rate) + (calc.weight * 230));

            return (
                <div className="min-h-screen pb-16">
                    <header className="max-w-[1400px] mx-auto p-10 flex justify-between items-center border-b border-gray-100">
                        <div>
                            <h1 className="text-3xl font-black text-slate-900 flex items-center gap-3">
                                <i data-lucide="compass" className="text-rose-600"></i> 日本代購決策終端
                            </h1>
                            <p className="text-slate-500 text-xs mt-1.5 jp-font tracking-widest">最後更新：{data.update_time}</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Live JPY/TWD</p>
                            <p className="text-5xl font-black text-slate-900 tracking-tighter">{data.rate.toFixed(4)}</p>
                        </div>
                    </header>

                    <main className="max-w-[1400px] mx-auto px-10 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
                        {/* 左側：雷達圖 */}
                        <div className="lg:col-span-3 space-y-6">
                            <h2 className="text-sm font-bold flex items-center gap-2 text-slate-500 uppercase tracking-widest">
                                <i data-lucide="hexagon" className="text-rose-500 w-4 h-4"></i> 分類綜合實力
                            </h2>
                            <div className="wabi-sabi-card p-8 rounded-2xl h-[360px] flex flex-col justify-center items-center">
                                <canvas id="radarChart"></canvas>
                                <div className="absolute text-center mt-[-10px]">
                                    <p className="text-[10px] text-slate-400 font-bold uppercase">品項</p>
                                    <p className="text-4xl font-black text-slate-800">{data.ranking.length}</p>
                                </div>
                            </div>
                        </div>

                        {/* 中間：排行榜 */}
                        <div className="lg:col-span-5 space-y-6">
                            <h2 className="text-sm font-bold flex items-center gap-2 text-slate-500 uppercase tracking-widest">
                                <i data-lucide="trending-up" className="text-rose-500 w-4 h-4"></i> 台灣熱度流動排行
                            </h2>
                            <div className="space-y-4">
                                {data.ranking.map((item, i) => (
                                    <div key={i} className="wabi-sabi-card p-6 rounded-2xl flex justify-between items-center relative overflow-hidden group">
                                        <div className="flex items-center gap-5 z-10">
                                            <div className="rank-number">{i + 1}</div>
                                            <div>
                                                <h3 className="font-bold text-slate-900 text-lg">{item.name}</h3>
                                                <p className="text-xs text-slate-500 jp-font">
                                                    <span className="text-rose-600 font-medium">{item.cat}</span> • ¥{item.jpy.toLocaleString()}
                                                </p>
                                            </div>
                                        </div>
                                        <div className="absolute inset-x-0 bottom-0 h-16 px-6 opacity-40 group-hover:opacity-80 transition">
                                            <canvas id={`lineChart-${i}`}></canvas>
                                        </div>
                                        <div className="text-right z-10">
                                            <p className="text-sm font-bold text-slate-900 tracking-tight">NT$ {Math.round(item.jpy * data.rate)}</p>
                                            <p className="text-[9px] bg-slate-100 px-1 rounded text-slate-400 mt-1">成本</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 右側：計算機 */}
                        <div className="lg:col-span-4 space-y-6">
                            <h2 className="text-sm font-bold flex items-center gap-2 text-slate-500 uppercase tracking-widest">
                                <i data-lucide="pencil" className="text-rose-500 w-4 h-4"></i> 利潤精算
                            </h2>
                            <div className="wabi-sabi-card p-8 rounded-3xl border-t-2 border-rose-600">
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 block mb-2 uppercase tracking-widest">商品原價 (¥ JPY)</label>
                                        <input type="number" className="w-full bg-slate-50 p-3 rounded-lg outline-none focus:border-rose-200 font-bold text-xl" value={calc.jpy} onChange={e => setCalc({...calc, jpy: e.target.value})} />
                                    </div>
                                    <div className="flex justify-between items-end border-t border-slate-100 pt-6">
                                        <span className="text-slate-800 font-bold jp-font">建議售價 <span className="text-xs font-normal text-slate-400">(20%利潤)</span></span>
                                        <span className="text-3xl font-black text-rose-600 tracking-tighter">NT$ {Math.round(totalCost * 1.2)}</span>
                                    </div>
                                    <p className="text-[10px] text-slate-400 text-center tracking-widest uppercase italic font-bold">Total Cost: NT$ {totalCost}</p>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
